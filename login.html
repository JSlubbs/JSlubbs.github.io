<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jonathan Slavuter — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #111110;
      color: #F4F3EE;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .heading {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 42px;
      font-weight: 300;
      font-style: italic;
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .sub {
      font-size: 13px;
      font-weight: 300;
      color: #6B6B66;
      margin-top: 10px;
      line-height: 1.55;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #6B6B66;
      font-weight: 500;
    }
    input[type="password"] {
      background: #1E1E1C;
      border: 1px solid #2E2E2B;
      border-radius: 4px;
      color: #F4F3EE;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 300;
      padding: 12px 16px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      -webkit-font-smoothing: antialiased;
    }
    input[type="password"]:focus { border-color: #4A4A46; }
    input[type="password"]::placeholder { color: #4A4A46; }
    button {
      background: transparent;
      border: 1px solid rgba(244,243,238,0.18);
      border-radius: 3px;
      color: #F4F3EE;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 12px 24px;
      cursor: pointer;
      transition: border-color 0.2s;
      width: 100%;
    }
    button:hover { border-color: rgba(244,243,238,0.4); }
    .error {
      font-size: 12px;
      color: #C0584A;
      display: none;
      letter-spacing: 0.02em;
    }
    .error.visible { display: block; }
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      <h1 class="heading">Jonathan Slavuter</h1>
      <p class="sub">Portfolio — enter password to continue.</p>
    </div>
    <div class="field">
      <label for="pw">Password</label>
      <input type="password" id="pw" placeholder="········" autofocus>
      <span class="error" id="err">Incorrect password.</span>
    </div>
    <button onclick="attempt()">Enter →</button>
  </div>

  <script>
    // ── Change this password ──────────────────────────────────────────────
    const PASSWORD = 'hhh_standard';
    // ─────────────────────────────────────────────────────────────────────

    const redirect = new URLSearchParams(window.location.search).get('r') || './';

    document.getElementById('pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') attempt();
    });

    function attempt() {
      const val = document.getElementById('pw').value;
      if (val === PASSWORD) {
        sessionStorage.setItem('js_auth', '1');
        window.location.href = redirect;
      } else {
        document.getElementById('err').classList.add('visible');
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    }

    // Already authenticated?
    if (sessionStorage.getItem('js_auth') === '1') {
      window.location.href = redirect;
    }
  </script>
</body>
</html>
